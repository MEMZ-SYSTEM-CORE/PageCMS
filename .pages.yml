media:
  input: public/media
  output: /media
  accept: '*/*'
  max_file_size: 25165824  # 25MB — 超过此大小建议用 upload-media.sh 脚本直传

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: pubDate
        type: date
        required: true
      - name: description
        type: text
        hint: 文章摘要，会显示在卡片和搜索引擎中
      - name: image
        type: image
        label: Cover Image
        hint: 支持 /media/ 目录的图片链接，也可以粘贴外部 URL
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
      - name: body
        type: rich-text
        hint: |

          📎 引用媒体 → 粘贴 /media/文件名.ext 即可自动渲染
          ▸ 视频(.mp4) / 音频(.mp3) → 播放器
          ▸ 图片(.png) → 显示图片
          ▸ 文件(.exe/.zip/.pdf) → 下载卡片
          ⚠️ 大文件(>10MB) 用工具上传: 项目根目录双击 upload.html 或运行 .\upload-media.ps1

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text
        hint: |

          📎 引用媒体 → 粘贴 /media/文件名.ext 即可自动渲染
          ▸ 视频 / 音频 → 播放器
          ▸ 文件 (.exe/.zip/.pdf) → 下载卡片

  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.md
    format: yaml-frontmatter
    fields:
      - name: siteName
        type: string
        label: Site Name
        required: true
      - name: tagline
        type: text
        label: Tagline
      - name: footerText
        type: text
        label: Footer Description
      - name: ogImage
        type: image
        label: Default OG Image
        hint: 分享到社交媒体时显示的封面图，推荐 1200×630
      - name: seoDescription
        type: text
        label: SEO Description
        hint: 留空则使用 tagline
