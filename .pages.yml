media:
  input: public/media
  output: /media
  accept: '*/*'

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: pubDate
        type: date
        required: true
      - name: description
        type: text
        hint: 文章摘要，会显示在卡片和搜索引擎中
      - name: image
        type: image
        label: Cover Image
        hint: 支持 /media/ 目录的图片链接，也可以粘贴外部 URL
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
      - name: body
        type: rich-text
        hint: |

          📎 引用云盘链接 → 粘贴外部文件链接即可自动渲染
          ▸ 视频(.mp4) / 音频(.mp3) → 播放器
          ▸ 图片(.png) → 显示图片
          ▸ 文件(.exe/.zip/.pdf) → 下载卡片（右侧"打开链接"）
          💡 大文件请上传到网盘（百度网盘/阿里云盘等），直接粘贴分享链接
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text
        hint: |

          📎 引用云盘链接 → 粘贴外部文件链接自动渲染
          ▸ 视频 / 音频 → 播放器
          ▸ 文件 → 下载卡片（右侧"打开链接"）
          💡 大文件请上传到网盘，粘贴分享链接

  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.md
    format: yaml-frontmatter
    fields:
      - name: siteName
        type: string
        label: Site Name
        required: true
      - name: tagline
        type: text
        label: Tagline
      - name: footerText
        type: text
        label: Footer Description
      - name: ogImage
        type: image
        label: Default OG Image
        hint: 分享到社交媒体时显示的封面图，推荐 1200×630
      - name: seoDescription
        type: text
        label: SEO Description
        hint: 留空则使用 tagline
