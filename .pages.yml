media:
  input: public/media
  output: /media

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: pubDate
        type: date
        required: true
      - name: description
        type: text
      - name: image
        type: image
        label: Cover Image
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
      - name: body
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text

  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.md
    format: yaml-frontmatter
    fields:
      - name: siteName
        type: string
        label: Site Name
        required: true
      - name: tagline
        type: text
        label: Tagline
      - name: footerText
        type: text
        label: Footer Description
