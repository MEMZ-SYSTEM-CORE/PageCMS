media:
  input: public/media
  output: /media

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: pubDate
        type: date
        required: true
      - name: description
        type: text
      - name: image
        type: image
        label: Cover Image
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
      - name: body
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text

  - name: music
    label: Music
    type: collection
    path: src/content/music
    format: yaml-frontmatter
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: artist
        type: string
        label: Artist
        required: true
      - name: file
        type: file
        label: Audio File
        required: true
      - name: cover
        type: image
        label: Cover Art
      - name: order
        type: number
        label: Play Order
      - name: body
        type: rich-text
        label: Lyrics
