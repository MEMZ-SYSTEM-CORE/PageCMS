media:
  input: public/media
  output: /media
  accept: audio/*,video/*

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: pubDate
        type: date
        required: true
      - name: description
        type: text
        hint: 文章摘要，会显示在卡片和搜索引擎中
      - name: image
        type: image
        label: Cover Image
        hint: 支持 /media/ 目录的图片链接，也可以粘贴外部 URL
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
      - name: body
        type: rich-text
        hint: |

          正文支持 Markdown 语法（**加粗**、*斜体*、[链接](url)、## 标题等）
          📎 媒体播放 → 粘贴视频或音频链接即可自动渲染播放器
          ▸ 视频 .mp4/.webm/.mov → 嵌入播放器
          ▸ 音频 .mp3/.wav/.flac → 音乐播放器
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text
        hint: |

          正文支持 Markdown 语法
          📎 粘贴视频/音频链接自动渲染播放器
  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.md
    format: yaml-frontmatter
    fields:
      - name: siteName
        type: string
        label: Site Name
        required: true
      - name: tagline
        type: text
        label: Tagline
      - name: footerText
        type: text
        label: Footer Description
      - name: ogImage
        type: image
        label: Default OG Image
        hint: 分享到社交媒体时显示的封面图，推荐 1200×630
      - name: seoDescription
        type: text
        label: SEO Description
        hint: 留空则使用 tagline
