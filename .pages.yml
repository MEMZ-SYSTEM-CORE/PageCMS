# .Pages.yml - 最简可用配置
site:
  title: "我的网站"

collections:
  posts:
    type: "post"
    label: "文章"
    folder: "content/posts"
    create: true
    fields:
      - name: "title"
        label: "标题"
        type: "string"
        required: true
      - name: "content"
        label: "内容"
        type: "markdown"
        required: true

media:
  upload_dir: "uploads"
