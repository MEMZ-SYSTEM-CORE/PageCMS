<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafafa">
<title>登录 — MEMZ-SYSTEM-CORE</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --fg: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --card: #ffffff;
    --accent: #18181b;
    --accent-fg: #fafafa;
    --radius: 12px;
    --error: #dc2626;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  .dark {
    --bg: #09090b;
    --fg: #fafafa;
    --muted: #a1a1aa;
    --border: #27272a;
    --card: #18181b;
    --accent: #fafafa;
    --accent-fg: #09090b;
    --error: #ef4444;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, color .2s;
  }

  .login-card {
    width: 100%;
    max-width: 360px;
    padding: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .logo {
    text-align: center;
    margin-bottom: 24px;
  }
  .logo .icon {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .logo p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus {
    border-color: var(--fg);
  }
  .form-group input::placeholder {
    color: var(--muted);
    opacity: .6;
  }

  .error-msg {
    display: none;
    font-size: 12px;
    color: var(--error);
    margin-bottom: 12px;
    padding: 8px 12px;
    background: color-mix(in srgb, var(--error) 8%, var(--bg));
    border-radius: 6px;
    border: 1px solid color-mix(in srgb, var(--error) 20%, transparent);
  }
  .error-msg.show { display: block; }

  .submit-btn {
    width: 100%;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-fg);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  .theme-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    color: var(--fg);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .theme-btn:hover { background: var(--border); }
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" aria-label="切换主题">🌙</button>

<div class="login-card">
  <div class="logo">
    <div class="icon">🔐</div>
    <h1>管理后台</h1>
    <p>MEMZ-SYSTEM-CORE</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" autocomplete="off">
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" placeholder="请输入管理密码" autofocus>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">登录</button>
  </form>
</div>

<script>
(function() {
  /* ---- Theme ---- */
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(t) {
    document.documentElement.classList.toggle('dark', t === 'dark');
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  }
  let theme = localStorage.getItem('theme');
  if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(theme);
  themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', theme);
    applyTheme(theme);
  });

  /* ---- Login ---- */
  const form = document.getElementById('loginForm');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Get redirect URL from query param
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect') || '/admin/media';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = passwordInput.value.trim();
    if (!password) {
      showError('请输入密码');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '验证中...';
    hideError();

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, redirect }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Redirect to the original page
        location.href = data.redirect;
      } else {
        showError(data.error || '密码错误');
        passwordInput.value = '';
        passwordInput.focus();
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    } catch (err) {
      showError('网络错误: ' + err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = '登录';
    }
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }
  function hideError() {
    errorMsg.classList.remove('show');
  }

  passwordInput.focus();
})();
</script>
</body>
</html>
