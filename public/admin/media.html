<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafafa">
<title>媒体库 — MEMZ-SYSTEM-CORE</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --fg: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --card: #ffffff;
    --accent: #18181b;
    --accent-fg: #fafafa;
    --danger: #dc2626;
    --danger-fg: #fafafa;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  .dark {
    --bg: #09090b;
    --fg: #fafafa;
    --muted: #a1a1aa;
    --border: #27272a;
    --card: #18181b;
    --accent: #fafafa;
    --accent-fg: #09090b;
    --danger: #ef4444;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    transition: background .2s, color .2s;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    height: 48px; padding: 0 16px; max-width: 1200px; margin: 0 auto; width: 100%;
  }
  header a { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); text-decoration: none; }
  header a:hover { opacity: .7; }
  header nav { display: flex; align-items: center; gap: 6px; }
  header nav a { font-weight: 500; font-size: 13px; padding: 4px 10px; border-radius: 6px; transition: background .15s; }
  header nav a:hover { background: var(--border); opacity: 1; }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; }
  .logout-btn:hover { background: var(--border); color: var(--error); }
  .theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; color: var(--fg); font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .theme-btn:hover { background: var(--border); }

  .page { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .page-header .sub { font-size: 13px; color: var(--muted); }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); border-bottom-color: var(--fg); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Upload dropzone */
  .dropzone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
  .dropzone:hover, .dropzone.dragover { border-color: var(--fg); background: color-mix(in srgb, var(--fg) 3%, var(--bg)); }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; opacity: .5; }
  .dropzone-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .dropzone-hint { font-size: 12px; color: var(--muted); }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .file-queue { display: none; margin-top: 12px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; align-items: center; gap: 10px; }
  .file-queue.show { display: flex; }
  .file-queue .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-queue .size { color: var(--muted); white-space: nowrap; }
  .file-queue .cancel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; }
  .file-queue .cancel:hover { color: var(--danger); }

  .upload-actions { display: none; gap: 8px; margin-top: 10px; }
  .upload-actions.show { display: flex; }
  .btn { padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  .btn-small { padding: 5px 12px; font-size: 12px; }

  .upload-progress { display: none; margin-top: 12px; }
  .upload-progress.show { display: block; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .3s; }
  .progress-text { font-size: 12px; color: var(--muted); text-align: center; }

  /* Media grid */
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }

  .media-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow .15s;
    position: relative;
  }
  .media-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }

  .media-preview {
    width: 100%;
    height: 140px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .media-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media-preview .audio-icon {
    font-size: 36px;
    opacity: .4;
  }
  .media-preview .file-icon {
    font-size: 36px;
    opacity: .4;
  }
  .media-preview .ext-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(0,0,0,.5);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .media-info { padding: 8px 10px; }
  .media-info .name { font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-info .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .media-actions {
    display: flex;
    gap: 4px;
    padding: 6px 10px 8px;
    border-top: 1px solid var(--border);
  }
  .media-actions button {
    flex: 1;
    padding: 4px 0;
    font-size: 11px;
    font-weight: 500;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg);
    color: var(--muted);
  }
  .media-actions button:hover { background: var(--border); color: var(--fg); }
  .media-actions .copy-btn:hover { background: var(--accent); color: var(--accent-fg); }
  .media-actions .del-btn:hover { background: var(--danger); color: var(--danger-fg); }

  /* Loading */
  .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
  .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--fg); border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 8px; opacity: .4; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); opacity: 0; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; background: var(--card); border: 1px solid var(--border); color: var(--fg); pointer-events: none; transition: all .3s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #16a34a; color: #16a34a; }
  .toast.error { border-color: #dc2626; color: #dc2626; }

  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column-reverse; gap: 8px; z-index: 999; pointer-events: none; }
  .toast-msg { opacity: 0; transform: translateY(20px); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; background: var(--card); border: 1px solid var(--border); color: var(--fg); transition: all .3s; white-space: nowrap; pointer-events: auto; }
  .toast-msg.show { opacity: 1; transform: translateY(0); }
  .toast-msg.success { border-color: #16a34a; color: #16a34a; }
  .toast-msg.error { border-color: #dc2626; color: #dc2626; }
</style>
</head>
<body>
<header>
  <a href="/">MEMZ-SYSTEM-CORE</a>
  <nav>
    <a href="/">文章</a>
    <a href="/upload.html">上传</a> <a href="/admin/media" style="font-weight:600">媒体库</a>
    <a href="/about">关于</a>
    <button class="logout-btn" id="logoutBtn">退出</button>
    <button class="theme-btn" id="themeBtn" aria-label="切换主题">🌙</button>
  </nav>
</header>

<div class="page">
  <div class="page-header">
    <div>
      <h1>📁 媒体库</h1>
      <div class="sub">管理 <code>public/media/</code> 中的文件</div>
    </div>
    <div>
      <button class="btn btn-ghost btn-small" onclick="refreshMedia()">⟳ 刷新</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('library', this)">所有文件</button>
    <button class="tab" onclick="switchTab('upload', this)">上传</button>
  </div>

  <!-- Library Tab -->
  <div class="panel active" id="panel-library">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>加载中...</div>
    </div>
    <div class="empty-state" id="empty" style="display:none">
      <div class="icon">📂</div>
      <div>暂无文件</div>
      <div style="font-size:12px;margin-top:4px">点击「上传」标签添加文件</div>
    </div>
    <div class="media-grid" id="mediaGrid"></div>
  </div>

  <!-- Upload Tab -->
  <div class="panel" id="panel-upload">
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📤</div>
      <div class="dropzone-text">拖拽文件到这里</div>
      <div class="dropzone-hint">或点击选择 · 最大 100MB（GitHub 限制）</div>
      <input type="file" id="fileInput">
    </div>

    <div class="file-queue" id="fileQueue">
      <span class="name" id="fileName"></span>
      <span class="size" id="fileSize"></span>
      <button class="cancel" id="cancelBtn">✕</button>
    </div>
    <div class="upload-actions" id="uploadActions">
      <button class="btn btn-primary" id="uploadBtn">上传文件</button>
      <button class="btn btn-ghost btn-small" id="clearBtn">清除</button>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
(function() {
  /* ---- Theme ---- */
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(t) {
    document.documentElement.classList.toggle('dark', t === 'dark');
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  }
  let theme = localStorage.getItem('theme');
  if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(theme);
  themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', theme);
    applyTheme(theme);
  });

  /* ---- Toast ---- */
  function toast(msg, type) {
    const el = document.createElement('div');
    el.className = 'toast-msg ' + type + ' show';
    el.textContent = msg;
    document.getElementById('toastWrap').appendChild(el);
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
  }

  /* ---- Tabs ---- */
  window.switchTab = function(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'library') refreshMedia();
  };

  /* ---- Media Grid ---- */
  const loading = document.getElementById('loading');
  const empty = document.getElementById('empty');
  const grid = document.getElementById('mediaGrid');

  async function refreshMedia() {
    loading.style.display = 'block';
    empty.style.display = 'none';
    grid.innerHTML = '';

    try {
      const res = await fetch('/api/media');
      const data = await res.json();
      loading.style.display = 'none';

      if (!data.files || data.files.length === 0) {
        empty.style.display = 'block';
        return;
      }

      grid.innerHTML = data.files.map(f => buildCard(f)).join('');
      attachCardEvents(data.files);
    } catch (err) {
      loading.style.display = 'none';
      grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>加载失败: ' + err.message + '</div></div>';
    }
  }

  function getExt(name) {
    const i = name.lastIndexOf('.');
    return i > 0 ? name.slice(i + 1).toLowerCase() : '';
  }

  function isImage(ext) { return ['jpg','jpeg','png','gif','webp','avif','svg','bmp','ico'].includes(ext); }
  function isVideo(ext) { return ['mp4','webm','ogg','mov','avi','mkv'].includes(ext); }
  function isAudio(ext) { return ['mp3','wav','flac','aac','m4a','wma','ogg'].includes(ext); }

  function buildCard(f) {
    const ext = getExt(f.name);
    const sizeStr = f.size < 1024 ? f.size + ' B' : f.size < 1048576 ? (f.size/1024).toFixed(1) + ' KB' : (f.size/1048576).toFixed(1) + ' MB';

    let preview = '';
    if (isImage(ext)) {
      preview = `<img src="${f.path}" alt="${f.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'file-icon\\'>🖼</div>'">`;
    } else if (isVideo(ext)) {
      preview = `<video src="${f.path}" preload="metadata" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>`;
    } else if (isAudio(ext)) {
      preview = `<div class="audio-icon">🎵</div><div class="ext-badge">${ext}</div>`;
    } else {
      preview = `<div class="file-icon">📄</div><div class="ext-badge">${ext}</div>`;
    }

    return `<div class="media-card" data-path="${f.path}" data-raw="${f.rawUrl}" data-name="${f.name}">
      <div class="media-preview">${preview}</div>
      <div class="media-info">
        <div class="name" title="${f.name}">${f.name}</div>
        <div class="meta">${sizeStr}</div>
      </div>
      <div class="media-actions">
        <button class="copy-btn" data-action="copy">复制链接</button>
        <button class="del-btn" data-action="delete">删除</button>
      </div>
    </div>`;
  }

  function attachCardEvents(files) {
    grid.querySelectorAll('[data-action="copy"]').forEach((btn, i) => {
      btn.addEventListener('click', () => {
        const url = files[i].path;
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = '已复制 ✓';
          toast('链接已复制: ' + url, 'success');
          setTimeout(() => { btn.textContent = '复制链接'; }, 2000);
        }).catch(() => toast('复制失败', 'error'));
      });
    });

    grid.querySelectorAll('[data-action="delete"]').forEach((btn, i) => {
      btn.addEventListener('click', async () => {
        if (!confirm('确定要删除 ' + files[i].name + ' 吗？')) return;
        btn.textContent = '删除中...';
        btn.disabled = true;
        try {
          const res = await fetch('/api/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileName: files[i].name }),
          });
          const data = await res.json();
          if (res.ok) {
            toast('已删除: ' + files[i].name, 'success');
            refreshMedia();
          } else {
            toast(data.error || '删除失败', 'error');
            btn.textContent = '删除';
            btn.disabled = false;
          }
        } catch (err) {
          toast('删除失败: ' + err.message, 'error');
          btn.textContent = '删除';
          btn.disabled = false;
        }
      });
    });
  }

  /* ---- Upload ---- */
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileQueue = document.getElementById('fileQueue');
  const fileNameEl = document.getElementById('fileName');
  const fileSizeEl = document.getElementById('fileSize');
  const cancelBtn = document.getElementById('cancelBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const clearBtn = document.getElementById('clearBtn');
  const uploadActions = document.getElementById('uploadActions');
  const uploadProgress = document.getElementById('uploadProgress');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  let selectedFile = null;
  let githubToken = null;

  async function getToken() {
    if (githubToken) return githubToken;
    try {
      const res = await fetch('/api/token');
      if (res.status === 401) {
        location.href = '/admin/login.html?redirect=' + encodeURIComponent(location.pathname);
        return null;
      }
      const data = await res.json();
      githubToken = data.token;
      return githubToken;
    } catch (err) {
      toast('无法获取上传凭证: ' + err.message, 'error');
      return null;
    }
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function handleFile(file) {
    if (!file) return;
    if (file.size > 100 * 1024 * 1024) {
      toast('文件超过 100MB 限制', 'error');
      return;
    }
    selectedFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatSize(file.size);
    fileQueue.classList.add('show');
    uploadActions.classList.add('show');
    uploadProgress.classList.remove('show');
    progressFill.style.width = '0%';
    uploadBtn.disabled = false;
    uploadBtn.textContent = '上传';
  }

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  cancelBtn.addEventListener('click', () => { selectedFile = null; fileInput.value = ''; fileQueue.classList.remove('show'); uploadActions.classList.remove('show'); });
  clearBtn.addEventListener('click', () => { selectedFile = null; fileInput.value = ''; fileQueue.classList.remove('show'); uploadActions.classList.remove('show'); });

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const token = await getToken();
    if (!token) { toast('无法获取上传凭证', 'error'); return; }

    uploadBtn.disabled = true;
    uploadBtn.textContent = '处理中...';
    uploadProgress.classList.add('show');
    progressFill.style.width = '0%';
    progressText.textContent = '读取文件中...';

    try {
      // Step 1: Read file as base64 via FileReader (browser native, no server CPU)
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 50);
            progressFill.style.width = pct + '%';
            progressText.textContent = '读取文件中 ' + pct + '%';
          }
        };
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error('读取文件失败'));
        reader.readAsDataURL(selectedFile);
      });

      progressFill.style.width = '50%';
      progressText.textContent = '上传到 GitHub...';

      // Step 2: Upload directly to GitHub API (CORS enabled)
      const safeName = selectedFile.name.replace(/[^a-zA-Z0-9\u4e00-\u9fff\.\s_-]/g, '_');
      const filePath = 'public/media/' + safeName;
      const apiUrl = 'https://api.github.com/repos/MEMZ-SYSTEM-CORE/PageCMS/contents/' + encodeURIComponent(filePath);
      const auth = 'Bearer ' + token;
      const GITHUB_UA = 'MEMZ-PageCMS-Upload';

      // Try PUT first. If 422 (file exists, no SHA), fetch SHA and retry.
      let sha = null;
      let uploadRes = null;
      let lastErr = null;

      for (let attempt = 1; attempt <= 3; attempt++) {
        progressText.textContent = '上传到 GitHub (' + attempt + '/3)';
        progressFill.style.width = (55 + attempt * 10) + '%';

        const body = {
          message: sha ? '更新: ' + safeName : '上传: ' + safeName,
          content: base64,
          branch: 'master',
        };
        if (sha) body.sha = sha;

        const putRes = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': auth,
            'Accept': 'application/vnd.github.v3+json',
            'User-Agent': GITHUB_UA,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        if (putRes.ok) { uploadRes = putRes; break; }
        lastErr = putRes;

        if (putRes.status === 422 && !sha) {
          // File exists but no SHA - fetch it and retry
          progressText.textContent = '获取文件信息...';
          const getRes = await fetch(apiUrl, {
            headers: { 'Authorization': auth, 'Accept': 'application/vnd.github.v3+json', 'User-Agent': GITHUB_UA },
          });
          if (getRes.ok) {
            const existing = await getRes.json();
            sha = existing.sha;
            continue;
          }
        }

        if (putRes.status === 503 && attempt < 3) {
          progressText.textContent = 'GitHub 繁忙，重试中 (' + attempt + '/3)...';
          await new Promise(r => setTimeout(r, 1500 * attempt));
        } else break;
      }

      if (!uploadRes) {
        let msg = '上传失败';
        try { const d = await lastErr.json(); msg = d.message || msg; } catch {}
        throw new Error('GitHub API ' + (lastErr ? lastErr.status : '错误') + ': ' + msg);
      }
      }
      }

      progressFill.style.width = '100%';
      progressText.textContent = '✅ 上传完成 ✓';

      const mediaUrl = '/media/' + encodeURIComponent(safeName);
      toast('上传成功: ' + mediaUrl, 'success');
      navigator.clipboard.writeText(mediaUrl).catch(() => {});

      uploadBtn.textContent = '再传一个';
      uploadBtn.disabled = false;

      setTimeout(() => {
        selectedFile = null;
        fileInput.value = '';
        fileQueue.classList.remove('show');
        uploadActions.classList.remove('show');
        uploadProgress.classList.remove('show');
        document.querySelectorAll('.tab')[0].click();
      }, 2000);
    } catch (err) {
      uploadProgress.classList.remove('show');
      toast('上传失败: ' + err.message, 'error');
      uploadBtn.textContent = '重新上传';
      uploadBtn.disabled = false;
    }
  });

  document.addEventListener('paste', (e) => {
    if (e.target.closest('input, textarea, button')) return;
    const files = e.clipboardData.files;
    if (files.length) { handleFile(files[0]); switchTab('upload', document.querySelectorAll('.tab')[1]); }
  });

  /* ---- Init ---- */
  // Check auth on load
  (async function checkAuth() {
    try {
      const res = await fetch('/api/auth/check');
      if (!res.ok) {
        location.href = '/admin/login.html?redirect=/admin/media';
        return;
      }
    } catch {
      location.href = '/admin/login.html?redirect=/admin/media';
      return;
    }
    refreshMedia();
  })();

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/';
  });
})();
</script>
</body>
</html>
